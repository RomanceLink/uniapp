# Template only.
# Copy this file to your local PaddleOCR checkout and adjust paths before training.

Global:
  use_gpu: true
  epoch_num: 80
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/led_digits_rec
  save_epoch_step: 5
  eval_batch_step: [0, 200]
  cal_metric_during_train: true
  pretrained_model:
  checkpoints:
  save_inference_dir: ./inference/led_digits_rec
  character_dict_path: /ABS/PATH/TO/training/meter_ocr/configs/dict_digits.txt
  character_type: ch
  max_text_length: 32
  infer_mode: false
  use_space_char: false

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    learning_rate: 0.0005
  regularizer:
    name: L2
    factor: 0.00001

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: MobileNetV1Enhance
    scale: 0.5
  Neck:
    name: SequenceEncoder
    encoder_type: svtr
    dims: 64
    depth: 2
    hidden_dims: 120
    use_guide: true
  Head:
    name: CTCHead
    fc_decay: 0.00001

Loss:
  name: CTCLoss

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataSet
    data_dir: /ABS/PATH/TO/PROJECT
    label_file_list:
      - /ABS/PATH/TO/training/meter_ocr/outputs/led/train.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecConAug: {}
      - RecAug: {}
      - MultiLabelEncode: {}
      - KeepKeys:
          keep_keys: [image, label, length]
  loader:
    shuffle: true
    batch_size_per_card: 64
    drop_last: true
    num_workers: 4

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /ABS/PATH/TO/PROJECT
    label_file_list:
      - /ABS/PATH/TO/training/meter_ocr/outputs/led/val.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode: {}
      - KeepKeys:
          keep_keys: [image, label, length]
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 2
